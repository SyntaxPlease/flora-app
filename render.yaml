services:
  - type: web
    name: flora-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DB_FILE
        value: /opt/render/project/src/backend/flora_db.json

  - type: web
    name: flora-frontend
    runtime: static
    rootDir: "Flora App/frontend"
    buildCommand: npm install && npm run build
    staticPublishPath: "./Flora App/frontend/build"
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
